<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: #f8f9fa;
}

/* CARD */
.contact-card{
    max-width: 900px;
    margin: 60px auto;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: all 0.4s ease;
}

/* CARD HOVER */
.contact-card:hover{
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* IMAGE */
.img-container{
    position: relative;
    overflow: hidden;
    height: 100%;
}

.form-img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.5s;
}

/* IMAGE ZOOM */
.img-container:hover .form-img{
    transform: scale(1.1);
}

/* DARK OVERLAY */
.img-overlay{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
    opacity: 0;
    transition: 0.4s;
}

.img-container:hover .img-overlay{
    opacity: 1;
}

/* FORM */
.form-body{
    padding: 25px;
    transition: 0.3s;
}

/* INPUT FOCUS */
.form-control:focus, .form-select:focus{
    border-color: gold;
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
}

/* BUTTON */
.submit-btn{
    background-color: gold;
    border: none;
    font-weight: bold;
    transition: 0.3s;
}

/* BUTTON HOVER */
.submit-btn:hover{
    background-color: #d4af37;
    transform: scale(1.05);
}
</style>

</head>
<body>

<div class="container">
    <div class="contact-card">
        <div class="row g-0">

            <!-- LEFT IMAGE -->
            <div class="col-md-5">
                <div class="img-container">
                    <img src="images/contact.avif" class="form-img">
                    <div class="img-overlay"></div>
                </div>
            </div>

            <!-- RIGHT FORM -->
            <div class="col-md-7">
                <div class="form-body">

                    <h3 class="text-center mb-4">Contact Us</h3>

                    <form onsubmit="handleSubmit(event)">

                        <!-- NAME -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Name</label>
                            <div class="row">
                                <div class="col-6">
                                    <input type="text" class="form-control" placeholder="First Name" required>
                                </div>
                                <div class="col-6">
                                    <input type="text" class="form-control" placeholder="Last Name" required>
                                </div>
                            </div>
                        </div>

                        <!-- EMAIL -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" placeholder="Enter email" required>
                        </div>

                        <!-- HELP -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Help Regarding</label>
                            <select class="form-select" required>
                                <option value="">Select topic</option>
                                <option>Order Issue</option>
                                <option>Product Inquiry</option>
                                <option>Payment Problem</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <!-- MESSAGE -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Message</label>
                            <textarea class="form-control" rows="4" placeholder="Write your message..." required></textarea>
                        </div>

                        <!-- SUBMIT -->
                        <div class="text-center">
                            <button type="submit" class="btn submit-btn px-4">Submit</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
function handleSubmit(event){
    event.preventDefault();
    alert("✅ Your message has been submitted!");
    event.target.reset();
}
</script>

</body>
</html>
